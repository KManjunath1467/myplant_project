# Development Configuration
# ======================================
# This file is used when running: mvn spring-boot:run -Dspring-boot.run.arguments='--spring.profiles.active=dev'

spring.datasource.url=jdbc:mysql://localhost:3306/myplant_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

logging.level.root=INFO
logging.level.com.myplant=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
