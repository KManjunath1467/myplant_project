# MyPlant Application Configuration
# ======================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.shutdown=graceful
server.compression.enabled=true

# Application name
spring.application.name=MyPlant Smart Plant Care API

# ======================================
# Database Configuration
# ======================================
spring.datasource.url=jdbc:mysql://localhost:3306/myplant?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Manju@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ======================================
# JWT Configuration
# ======================================
jwt.secret=MyPlantSecretKey123456789012345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# ======================================
# Email Configuration (for Spring Mail)
# ======================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ======================================
# OpenWeatherMap API Configuration
# ======================================
openweathermap.api.key=YOUR_OPENWEATHERMAP_API_KEY
openweathermap.api.url=https://api.openweathermap.org/data/2.5/weather

# ======================================
# Twilio Configuration (for WhatsApp)
# ======================================
twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.whatsapp-number=whatsapp:+14155238886

# ======================================
# Logging Configuration
# ======================================
logging.level.root=INFO
logging.level.com.myplant=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/myplant.log
logging.file.max-size=10MB
logging.file.max-history=10

# ======================================
# Jackson Configuration (JSON Processing)
# ======================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ======================================
# Actuator Configuration (Health endpoints)
# ======================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ======================================
# Connection Pool Configuration
# ======================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
